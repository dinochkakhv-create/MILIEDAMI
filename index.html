<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта!</title>
    <style>
        /* Сброс стандартных отступов и настройка фона */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fff9f9 0%, #ffe4e4 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* Основная открытка */
        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 25px 45px rgba(200, 50, 100, 0.25),
                        0 10px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 2px solid rgba(255, 200, 220, 0.7);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        /* Шапка с изображением */
        .hero {
            width: 100%;
            height: auto;
            border-bottom: 5px solid #ffb6c1;
        }

        .hero img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: cover;
            max-height: 400px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
        }

        /* Содержимое открытки */
        .content {
            padding: 35px 30px 45px;
            text-align: center;
            background: radial-gradient(circle at 10% 30%, #fff0f5, transparent 60%);
        }

        h1 {
            font-size: clamp(2.8rem, 12vw, 5rem);
            font-weight: 800;
            color: #b03a5a;
            text-shadow: 3px 3px 0 #ffd9e2, 6px 6px 0 rgba(255, 105, 150, 0.3);
            margin-bottom: 15px;
            line-height: 1.1;
            letter-spacing: 2px;
            word-break: break-word;
        }

        .subtitle {
            font-size: clamp(1.3rem, 5vw, 2rem);
            font-weight: 400;
            color: #a65771;
            background: linear-gradient(135deg, #ffd2dc, #ffe8ed);
            display: inline-block;
            padding: 15px 35px;
            border-radius: 60px;
            margin: 20px 0 25px;
            box-shadow: 0 5px 12px #ffb8c9;
            border: 2px solid white;
            backdrop-filter: blur(2px);
        }

        .greeting {
            font-size: 1.5rem;
            color: #8f4761;
            margin: 25px 0 20px;
            font-weight: 500;
            font-style: italic;
        }

        .flowers {
            font-size: 2.2rem;
            letter-spacing: 12px;
            filter: drop-shadow(0 4px 4px #ffa5b9);
            margin: 15px 0 5px;
        }

        /* Украшение внизу */
        .footer-note {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #c06077;
            border-top: 2px dashed #ffbfcb;
            padding-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-note span {
            background: #ffecf0;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 500;
            box-shadow: 0 3px 6px #fac0cd;
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            .card {
                border-radius: 30px;
            }
            .content {
                padding: 25px 15px 30px;
            }
            .subtitle {
                padding: 10px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Картинка из вашей ссылки (она уже содержит текст "МАРТА") -->
        <div class="hero">
            <img src="https://avatars.mds.yandex.net/get-entity_search/7751290/1244813786/S600xU_2x" 
                 alt="Поздравительная картинка с тюльпанами и надписью МАРТА"
                 loading="lazy">
        </div>

        <div class="content">
            <!-- Дополнительное праздничное сообщение -->
            <h1>🌷 8 Марта 🌷</h1>
            <div class="subtitle">
                С международным женским днем!
            </div>
            <p class="greeting">
                Дорогие и прекрасные!<br>
                Пусть этот день будет наполнен весенним теплом, цветами и радостью.
            </p>
            <div class="flowers">
                🌸 🌼 🌺
            </div>
            <!-- Нижняя часть с пожеланиями -->
            <div class="footer-note">
                <span>✨ Счастья</span>
                <span>💐 Любви</span>
                <span>☀️ Весны</span>
                <span>🎉 Красоты</span>
            </div>
        </div>
    </div>
</body>
</html>
